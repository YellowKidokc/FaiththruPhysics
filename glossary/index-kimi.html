function renderTerms(){
  const q = document.getElementById('gl-input').value.toLowerCase().trim();
  const cat = document.querySelector('.gl-cat-btn.on')?.dataset.cat || '';
  const list = document.getElementById('gl-list');
  const filtered = TERMS.filter(t=>{
    if(cat && t.domain!==cat) return false;
    if(!q) return true;
    return (t.term+' '+t.def+' '+t.domain).toLowerCase().includes(q);
  });
  if(filtered.length===0){
    list.innerHTML='<div class="gl-empty">No terms match. Try another search.</div>';
    return;
  }
  list.innerHTML = filtered.map(t=>`
    <div class="gl-term">
      <div><div class="gl-term-name">${t.term}</div><span class="gl-term-domain">${t.domain}</span></div>
      <div class="gl-term-def">${t.def}</div>
      <div class="gl-term-ref">${t.ref}</div>
    </div>
  `).join('');
}

document.getElementById('gl-input').addEventListener('input',renderTerms);
document.querySelectorAll('.gl-cat-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.gl-cat-btn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    renderTerms();
  });
});
renderTerms();
</script>
