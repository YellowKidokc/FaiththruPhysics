<!DOCTYPE html>
<html lang="en">
<head>

<title>Redirecting to Media Library…</title>

<style>
:root{--bg:#050505;--gold:#d4af37;--text:#e0e0e0;--muted:#666;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem}
.inner{max-width:400px}
h1{font-family:'Crimson Text',Georgia,serif;font-size:1.8rem;color:var(--gold);margin-bottom:.5rem}
p{color:var(--muted);font-size:.9rem;line-height:1.6;margin-bottom:1.5rem}
a{color:var(--gold);text-decoration:none;font-size:.85rem}
a:hover{text-decoration:underline}
.spinner{width:32px;height:32px;border:2px solid rgba(212,175,55,.2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 1.5rem}
@keyframes spin{to{transform:rotate(360deg)}}

<div class="inner">
